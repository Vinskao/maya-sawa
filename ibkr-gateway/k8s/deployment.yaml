apiVersion: apps/v1
kind: Deployment
metadata:
  name: ibkr-gw
  labels:
    app.kubernetes.io/name: ibkr-gw
spec:
  # Single replica: the authenticated CPAPI session lives in memory on one
  # instance. Recreate avoids two instances competing for the same login.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ibkr-gw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ibkr-gw
    spec:
      imagePullSecrets:
      - name: dockerhub-credentials
      containers:
      - name: ibkr-gw
        image: papakao/ibkr-gateway:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "256Mi"
            cpu: "10m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        # Self-signed TLS + in-memory session: a plain TCP check is the most
        # robust liveness/readiness signal (HTTP probes hit auth/proxy quirks).
        readinessProbe:
          tcpSocket:
            port: 5000
          initialDelaySeconds: 20
          periodSeconds: 15
        livenessProbe:
          tcpSocket:
            port: 5000
          initialDelaySeconds: 40
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ibkr-gw
  namespace: default
  labels:
    app.kubernetes.io/name: ibkr-gw
spec:
  selector:
    app.kubernetes.io/name: ibkr-gw
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
  type: ClusterIP
